# rules.conf — Hyprland window and layer rules
# Docs: https://wiki.hyprland.org/Configuring/Window-Rules/

#──────────────────────────────────────────────
# Float rules (windows that should always float)
#──────────────────────────────────────────────
windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(file-roller)$
windowrule = float 1, match:class ^(org.gnome.Nautilus)$, match:title ^(.*Properties.*)$
windowrule = float 1, match:class ^(imv)$
windowrule = float 1, match:class ^(mpv)$
windowrule = float 1, match:title ^(Open File)$
windowrule = float 1, match:title ^(Save As)$
windowrule = float 1, match:title ^(Confirm.*)$
windowrule = float 1, match:title ^(Picture-in-Picture)$

# Polkit authentication dialogs
windowrule = float 1,        match:class ^(hyprpolkitagent)$
windowrule = size 400 200, match:class ^(hyprpolkitagent)$
windowrule = center 1,       match:class ^(hyprpolkitagent)$

#──────────────────────────────────────────────
# Size rules for floating windows
#──────────────────────────────────────────────
windowrule = size 900 600, match:class ^(pavucontrol)$
windowrule = center 1,       match:class ^(pavucontrol)$

windowrule = size 800 600, match:class ^(blueman-manager)$
windowrule = center 1,       match:class ^(blueman-manager)$

#──────────────────────────────────────────────
# Opacity rules
#──────────────────────────────────────────────
windowrule = opacity 0.92 0.85, match:class ^(kitty)$
windowrule = opacity 0.95 0.90, match:class ^(org.kde.dolphin)$

#──────────────────────────────────────────────
# Workspace assignments
#──────────────────────────────────────────────
windowrule = workspace 2, match:class ^(firefox)$
windowrule = workspace 3, match:class ^(org.kde.dolphin)$

#──────────────────────────────────────────────
# Idle inhibit (prevent lock while playing media)
#──────────────────────────────────────────────
windowrule = idle_inhibit fullscreen, match:class ^(mpv)$
windowrule = idle_inhibit fullscreen, match:class ^(firefox)$

#──────────────────────────────────────────────
# Picture-in-Picture
#──────────────────────────────────────────────
windowrule = float 1,          match:title ^(Picture-in-Picture)$
windowrule = pin 1,            match:title ^(Picture-in-Picture)$
windowrule = size 450 253,   match:title ^(Picture-in-Picture)$
windowrule = move 100%-455 100%-257, match:title ^(Picture-in-Picture)$

#──────────────────────────────────────────────
# Layer rules (for bars, notifications, etc.)
#──────────────────────────────────────────────
layerrule {
    name = waybar-blur
    match:namespace = waybar
    blur = true
    ignore_alpha = 0.2
}

layerrule {
    name = rofi-blur
    match:namespace = rofi
    blur = true
    ignore_alpha = 0.2
}

layerrule {
    name = notifications-blur
    match:namespace = notifications
    blur = true
    ignore_alpha = 0.2
}

#──────────────────────────────────────────────
# Fixes / tweaks
#──────────────────────────────────────────────
# Fix XWayland apps blurry on HiDPI
windowrule = xray 1, match:xwayland 1

# Disable shadow for tiled windows (performance)
windowrule = no_shadow 1, match:float 0
