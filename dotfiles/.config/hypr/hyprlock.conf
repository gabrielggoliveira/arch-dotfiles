background {
    monitor =
    path = screenshot
    color = rgba(33, 35, 55, 1.0)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.64
    dots_center = true
    outer_color = rgba(164, 140, 242, 0.8)
    inner_color = rgba(33, 35, 55, 0.7)
    font_color = rgba(235, 250, 250, 0.8)
    fade_on_empty = true
    placeholder_text = <i>Digitar senha...</i>
    hide_input = false
    position = 0, 50
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M") </big></b>"
    color = rgba(235, 250, 250, 0.8)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "<b> $(date +"%A, %d de %B") </b>"
    color = rgba(171, 180, 218, 0.8)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
